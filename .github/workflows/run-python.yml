name: Generate files index

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate files.json and files.html
        run: |
          python python/gen_files_json.py --outputs json,html .

      - name: Show generated files
        run: |
          echo "Generated files:"
          find . \( -name "files.json" -o -name "files.html" \) -print

      - name: Commit generated index files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "**/files.json" "**/files.html"

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Update generated file indexes"
            git push
          fi